<!DOCTYPE html>
<html>
<head>
  <!-- Include the Glia Applet SDK -->
  <script src="https://libs.glia.com/axon.js"></script>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

  body { 
    font-family: 'Inter', sans-serif; 
    padding: 40px; 
    background-color: #f8fafc; 
    color: #1e293b;
    display: flex;
    justify-content: center;
  }

  .container {
    background: white;
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 500px;
  }

  h3 { margin-top: 0; color: #0f172a; }

  #latestMessage { 
    margin: 15px 0; 
    padding: 15px; 
    background: #f1f5f9; 
    border-left: 4px solid #cbd5e1;
    border-radius: 4px; 
    font-style: italic; 
    color: #475569;
  }

  button { 
    width: 100%;
    padding: 12px; 
    background: #6366f1; 
    color: white; 
    border: none; 
    border-radius: 8px; 
    font-weight: 600;
    cursor: pointer; 
    transition: background 0.2s, transform 0.1s;
  }

  button:hover:not(:disabled) { background: #4f46e5; }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { background: #cbd5e1; cursor: not-allowed; }

  pre { 
    background: #1e293b; 
    color: #f8fafc;
    padding: 15px; 
    border-radius: 8px; 
    overflow-x: auto; 
    font-size: 0.85rem;
    margin-top: 20px;
  }

  .result-error {
    border: 2px solid #ef4444; 
    background-color: #fef2f2 !important; 
    color: #b91c1c !important; 
  }
</style>

<div class="container">
  <h3>VIP Message Analyzer</h3>
  
  <div><strong>Latest Visitor Message:</strong></div>
  <div id="latestMessage">Waiting for the visitor to say something...</div>
  
  <button id="analyzeVipBtn" disabled>Analyze as VIP</button>
  
  <pre id="result">Result will appear here...</pre>

  <script>
    const button = document.getElementById("analyzeVipBtn");
    const latestMessageDiv = document.getElementById("latestMessage");
    const resultDiv = document.getElementById("result");
    
    let lastVisitorText = ""; // We will store the latest message here

    // Initialize the Glia Applet SDK
    window.getGliaApi({version: 'v1'}).then(function(glia) {
      
      // 1. Listen for an active engagement
      glia.addBufferedEventListener(glia.EVENTS.ENGAGEMENT, function(engagement) {
        
        // 2. Listen to the live chat messages inside that engagement
        engagement.chat.addEventListener(engagement.chat.EVENTS.MESSAGES, function(messages) {
          
          // Grab the most recent message
          const lastMessage = messages[messages.length - 1] || messages; 
          
          // 3. Ensure we are only capturing messages sent by the visitor
          if (lastMessage && lastMessage.sender === 'visitor') {
            lastVisitorText = lastMessage.content;
            latestMessageDiv.innerText = `"${lastVisitorText}"`;
            
            // Enable the button now that we have a message to analyze
            button.disabled = false; 
          }
        });
      });

      // 4. Handle the button click
      button.addEventListener("click", async function() {
        if (!lastVisitorText) return;
        
        resultDiv.innerText = "Analyzing secure message...";
        button.disabled = true;

        try {
          // Grab the operator's secure headers
          const headers = glia.getHeaders();
          
          // Prepare the payload using the live message and setting is_vip to true
          const payload = {
            message: lastVisitorText,
            is_vip: true
          };

          // 5. Send it to Function A (Gateway)
          // REMEMBER TO REPLACE THIS URL WITH YOUR FUNCTION A URI
          const response = await fetch("https://api.glia.com/integrations/YOUR_FUNCTION_A_ID/endpoint", {
            method: "POST",
            headers: {
              ...headers,
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          const data = await response.json();
          
          // Display the final verdict on the screen
          // resultDiv.innerText = JSON.stringify(data, null, 2);
          resultDiv.innerText = data.alert_message || JSON.stringify(data);

        } catch (error) {
          resultDiv.innerText = `Error: ${error.message}`;
        } finally {
          button.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
