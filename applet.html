<!DOCTYPE html>
<html>
<head>
  <!-- Include the Glia Applet SDK -->
  <script src="https://libs.glia.com/axon.js"></script>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

  body { 
    font-family: 'Inter', sans-serif; 
    padding: 40px; 
    background-color: #f8fafc; 
    color: #1e293b;
    display: flex;
    justify-content: center;
  }

  .container {
    background: rgba(255, 255, 255, 0.95);
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 500px;
  }

  h3 { margin-top: 0; color: #0f172a; }

  #latestMessage { 
    margin: 15px 0; 
    padding: 15px; 
    background: #f1f5f9; 
    border-left: 4px solid #cbd5e1;
    border-radius: 4px; 
    font-style: italic; 
    color: #475569;
  }

  button { 
    width: 100%;
    padding: 12px; 
    background: #760ACC; 
    color: white; 
    border: none; 
    border-radius: 8px; 
    font-weight: 600;
    cursor: pointer; 
    transition: background 0.2s, transform 0.1s;
  }

  button:hover:not(:disabled) { background: #760ACC; }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { background: #cbd5e1; cursor: not-allowed; }

  pre { 
    background: #1e293b; 
    color: #f8fafc;
    padding: 15px; 
    border-radius: 8px; 
    overflow-x: auto; 
    font-size: 0.85rem;
    margin-top: 20px;
  }

  .result-error {
    border: 2px solid #ef4444; 
    background-color: #fef2f2 !important; 
    color: #b91c1c !important; 
  }
</style>

<div class="container">
  <h3>VIP Message Analyzer</h3>
  
  <div><strong>Latest Visitor Message:</strong></div>
  <div id="latestMessage">Waiting for the visitor to say something...</div>
  
  <button id="analyzeVipBtn" disabled>Analyze as VIP</button>
  
  <pre id="result">Result will appear here...</pre>

  <script>
const button = document.getElementById("analyzeVipBtn");
const latestMessageDiv = document.getElementById("latestMessage");
const resultDiv = document.getElementById("result");

let lastVisitorText = "";

window.getGliaApi({version: 'v1'}).then(function(glia) {

// Function to process messages and update the UI
function setupChatListener(engagement) {
engagement.chat.addEventListener(engagement.chat.EVENTS.MESSAGES, function(messages) {
// Handle both single objects and arrays of messages
const msgArray = Array.isArray(messages) ? messages : [messages];
const lastMessage = msgArray[msgArray.length - 1];

// Only capture messages sent by the visitor
if (lastMessage && lastMessage.sender === 'visitor') {
lastVisitorText = lastMessage.content;
latestMessageDiv.innerText = `"${lastVisitorText}"`;
button.disabled = false;
}
});
}

// 1. Listen for new engagements
glia.addBufferedEventListener(glia.EVENTS.ENGAGEMENT, function(engagement) {
setupChatListener(engagement);
});

// 2. Catch active engagements if the Applet loads after the chat starts
glia.getCurrentEngagement().then(function(engagement) {
if (engagement) {
setupChatListener(engagement);
}
});

// 3. Handle the button click
button.addEventListener("click", async function() {
if (!lastVisitorText) return;

resultDiv.innerText = "Analyzing secure message...";
button.disabled = true;

try {
// Get the session headers and extract token
let headers = await glia.getRequestHeaders();
const userToken = headers['Authorization'];

const payload = {
message: lastVisitorText,
is_vip: true,
token: userToken
};

// Call the Gateway (Function A)
const response = await fetch("https://api.glia.com/integrations/9ee11a57-614e-4aa2-96d0-e24dbba33392/endpoint", {
method: "POST",
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify(payload)
});

const result = await response.json();
resultDiv.innerText = JSON.stringify(result, null, 2);
} catch (error) {
resultDiv.innerText = "Error: " + error.message;
} finally {
button.disabled = false;
}
});
});
</script>
</body>
</html>
